name: build machine learning linux

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build_linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app_debug: [true, false]
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: 'true'
      - shell: bash
        run: |
          cd ./build
          make -f Machine-Learning.mk APP_DEBUG=${{matrix.app_debug}}
